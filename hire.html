<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hire SARKA</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,slnt,wdth,wght@8..144,-10..0,25..151,100..1000&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; min-height: 100vh;
      font-family: "Roboto Flex", sans-serif; font-weight: 650;
      font-stretch: 151%; letter-spacing: -0.05em;
      transition: background-color 0.1s ease, color 0.1s ease;
      position: relative; overflow-x: hidden;
    }

    .light-theme { background-color: #FFF200; color: #1200FF; }
    .dark-theme { background-color: #1200FF; color: #FFF200; }

    .top-nav {
      position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 4rem; font-size: 1.1rem; z-index: 100;
      transition: opacity 0.3s ease; user-select: none;
    }
    .top-nav.hidden { opacity: 0; pointer-events: none; }
    .top-nav a { color: inherit; text-decoration: none; }

    .logo { position: fixed; top: 30px; left: 40px; height: 1.5rem; z-index: 101; cursor: pointer; }
    .light-theme .logo { filter: invert(1); }

    .lang-switch { position: fixed; top: 30px; right: 40px; z-index: 101; cursor: pointer; user-select: none; }
    .lang { padding: 0 4px; }
    .lang-active { text-decoration: underline; }

    .form-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; }
    .form-wrapper { display: flex; align-items: flex-start; gap: 1rem; }
    .back-arrow-inline { font-size: 1.5rem; text-decoration: none; color: inherit; cursor: pointer; }

    .contact-form { display: flex; flex-direction: column; gap: 1rem; font-size: 1rem; width: 100%; color: inherit; }
    .contact-form input, .contact-form textarea, .contact-form select {
      background: transparent; border: none; border-bottom: 1px solid currentColor;
      padding: 0.5rem 0; color: inherit; font: inherit; outline: none;
    }
    .budget-options { display: flex; gap: 1.2rem; }
    .contact-form button {
      width: 100%; padding: 0.5rem 0; font-size: 0.95rem; font-weight: 1000;
      background: none; border: 1px solid currentColor; color: inherit; cursor: pointer;
    }
    .contact-form button:hover { background: currentColor; color: inherit; filter: invert(1); }

    @media (max-width: 768px) {
      .top-nav { top: 80px; gap: 1.5rem; }
      .form-container { width: 85%; }
    }
  </style>
</head>
<body class="light-theme">
  <a href="index.html"><img src="sarka-logo.svg" alt="SARKA logo" class="logo" /></a>
 
  <nav class="top-nav" data-lang-en="Home,Music,Portfolio" data-lang-gr="Αρχική,Μουσική,Πορτφόλιο">
    <a href="index.html">Home</a>
    <a href="music.html">Music</a>
    <a href="https://www.behance.net/feimixyz" target="_blank" rel="noopener">Portfolio</a>
  </nav>

  <div class="lang-switch">
    <span class="lang lang-active">EN</span> / <span class="lang">GR</span>
  </div>

  <div class="form-container">
    <div class="form-wrapper">
      <a href="index.html" class="back-arrow-inline">&#8592;</a>
      <form action="https://formspree.io/f/xwpqqpzk" method="POST" class="contact-form">
        <input type="text" name="name" placeholder="Full Name / Company Name" required />
        <input type="email" name="email" placeholder="Email Address" required />
        <select name="service" required>
          <option value="" disabled selected>Select your choice</option>
          <option value="graphic-design">Graphic Design</option>
          <option value="music-production">Music Production</option>
          <option value="both">Both</option>
        </select>
        <div class="budget-options">
            <label><input type="radio" name="budget" value="20-50" required /> 20–50 €</label>
            <label><input type="radio" name="budget" value="50-200" /> 50–200 €</label>
        </div>
        <textarea name="message" placeholder="Project Details" required></textarea>
        <button type="submit">Send</button>
      </form>
    </div>
  </div>

  <script>
    // 1. Scroll-triggered Header Hide
    const nav = document.querySelector('.top-nav');
    window.addEventListener('scroll', () => { nav.classList.toggle('hidden', window.scrollY > 50); });

    // 2. Theme Switching Logic (Debounced)
    function switchTheme() { 
        document.body.classList.toggle('light-theme'); 
        document.body.classList.toggle('dark-theme'); 
    }
    
    if (('ontouchstart' in window) || (navigator.maxTouchPoints > 0)) { 
        let lastSwitchTime = 0; 
        const throttleDelay = 100;
        window.addEventListener('scroll', () => {
            const now = Date.now();
            if (now - lastSwitchTime > throttleDelay) {
                switchTheme();
                lastSwitchTime = now;
            }
        }, { passive: true });
    }

    // 3. Language Persistence Logic
    function setLanguage(lang) {
        localStorage.setItem('userLanguage', lang);
        document.querySelectorAll('.lang').forEach(el => {
            el.classList.toggle('lang-active', el.textContent.trim().toLowerCase() === lang);
        });
        
        const navLabels = document.querySelector('.top-nav').getAttribute(`data-lang-${lang}`).split(",");
        document.querySelectorAll('.top-nav a').forEach((a, i) => a.textContent = navLabels[i]);
    }

    window.addEventListener('DOMContentLoaded', () => {
        const savedLang = localStorage.getItem('userLanguage') || 'en';
        setLanguage(savedLang);
    });

    document.querySelectorAll('.lang').forEach(el => {
      el.addEventListener('click', function() {
        setLanguage(this.textContent.trim().toLowerCase());
      });
    });
  </script>
</body>
</html>
