<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music | SARKA</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,slnt,wdth,wght@8..144,-10..0,25..151,100..1000&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            font-family: "Roboto Flex", sans-serif; font-weight: 650;
            font-stretch: 151%; letter-spacing: -0.05em;
            transition: background-color 0.1s ease, color 0.1s ease;
            overflow-x: hidden;
        }

        /* Theme Styles */
        .light-theme { background-color: #FFF200; color: #1200FF; }
        .dark-theme { background-color: #1200FF; color: #FFF200; }
        .light-theme .logo { filter: invert(1); }

        /* Navigation */
        .top-nav {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 4rem; font-size: 1.1rem; z-index: 100;
            transition: opacity 0.3s ease; user-select: none;
        }
        .top-nav.hidden { opacity: 0; pointer-events: none; }
        .top-nav a { color: inherit; text-decoration: none; }

        .logo { position: fixed; top: 30px; left: 40px; height: 1.5rem; z-index: 101; }
        .lang-switch { position: fixed; top: 30px; right: 40px; z-index: 101; cursor: pointer; }
        .lang-active { text-decoration: underline; }

        /* Music Grid */
        .music-grid {
            padding: 150px 40px 50px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
            max-width: 1200px; margin: 0 auto;
        }
        .release { display: flex; flex-direction: column; align-items: center; }
        .release img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 4px; }
        .release a { color: inherit; text-decoration: none; }
        .album-title { margin-top: 0.5rem; text-decoration: underline; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .top-nav { top: 80px; gap: 1.5rem; }
            .music-grid { 
                grid-template-columns: 1fr; 
                gap: 2rem; 
                padding-top: 150px;
            }
            .release { 
                flex-direction: row; 
                align-items: center; 
                gap: 1.5rem; 
            }
            .release img { width: 100px; height: 100px; }
            .album-title { text-decoration: underline; font-size: 1.2rem; }
        }
    </style>
</head>
<body class="dark-theme">
    <img src="sarka-logo.svg" alt="SARKA logo" class="logo" />
    <nav class="top-nav" data-lang-en="Home,Music,Portfolio" data-lang-gr="Αρχική,Μουσική,Πορτφόλιο">
        <a href="index.html">Home</a>
        <a href="music.html">Music</a>
        <a href="https://www.behance.net/feimixyz" target="_blank" rel="noopener">Portfolio</a>
    </nav>

    <div class="music-grid">
        <!-- Reusable function for release structure -->
        <div class="release">
            <a href="https://push.fm/fl/nocost"><img src="NC.jpg" alt="No Cost" /></a>
            <a href="https://push.fm/fl/nocost" class="album-title">No Cost</a>
        </div>
        <div class="release">
            <a href="https://push.fm/fl/hmih"><img src="HMIH.jpg" alt="Haus Made in Haus" /></a>
            <a href="https://push.fm/fl/hmih" class="album-title">Haus Made in Haus</a>
        </div>
        <div class="release">
            <a href="https://push.fm/fl/xuuxz"><img src="xuuxz.jpg" alt="xuuxz" /></a>
            <a href="https://push.fm/fl/xuuxz" class="album-title">xuuxz</a>
        </div>
        <div class="release">
            <a href="https://push.fm/fl/dk-sg"><img src="DKSG.jpg" alt="Deli Kız/Sinin Geliyor" /></a>
            <a href="https://push.fm/fl/dk-sg" class="album-title">Deli Kız/Sinin Geliyor</a>
        </div>
    </div>

    <div class="lang-switch">
        <span class="lang lang-active">EN</span> / <span class="lang">GR</span>
    </div>

    <script>
        // Scroll & Theme logic as used in index.html[span_1](start_span)[span_1](end_span)
        const nav = document.querySelector('.top-nav');
        window.addEventListener('scroll', () => { nav.classList.toggle('hidden', window.scrollY > 50); });

        function switchTheme() { 
            document.body.classList.toggle('light-theme'); 
            document.body.classList.toggle('dark-theme'); 
        }

        if (('ontouchstart' in window) || (navigator.maxTouchPoints > 0)) { 
            setInterval(switchTheme, 200);
        }

        document.querySelectorAll('.lang').forEach(el => {
            el.addEventListener('click', function() {
                const lang = this.textContent.trim().toLowerCase();
                localStorage.setItem('userLanguage', lang);
                location.reload(); // Simple refresh to apply labels
            });
        });
    </script>
</body>
</html>
